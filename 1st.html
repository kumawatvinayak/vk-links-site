<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VK's Quick Links</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color:white;
    }

    .container{
      text-align:center;
      background: rgba(255,255,255,0.08);
      padding:40px;
      border-radius:20px;
      backdrop-filter: blur(10px);
      box-shadow:0 0 20px rgba(0,0,0,0.3);
      width:350px;
    }

    h1{
      margin-bottom:25px;
      font-size:32px;
    }

    .links{
      display:flex;
      flex-direction:column;
      gap:15px;
    }

    .links a{
      text-decoration:none;
      color:white;
      background:#2563eb;
      padding:14px;
      border-radius:12px;
      transition:0.3s;
      font-size:18px;
      font-weight:bold;
    }

    .links a:hover{
      background:#1d4ed8;
      transform:scale(1.05);
    }

    footer{
      margin-top:20px;
      font-size:14px;
      opacity:0.7;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🌌 Quick Links</h1>

    <div class="links">
      <a href="https://www.google.com" target="_blank">Google</a>

      <a href="https://www.youtube.com" target="_blank">YouTube</a>

      <a href="https://www.twitch.tv" target="_blank">Twitch</a>

      <a href="https://www.github.com" target="_blank">GitHub</a>
    </div>

    <footer>
      Made by VK ⚡
    </footer>
  </div>

</body>
</html>
